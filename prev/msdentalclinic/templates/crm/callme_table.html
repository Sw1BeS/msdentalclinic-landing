<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM — MS Dental Clinic</title>
    <link href="static/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .badge-main { background-color: #0d6efd; }
        .badge-ad { background-color: #dc3545; }
        .source-ad { background: #fff3f3; }
    </style>
</head>
<body>

<div class="container pt-4">
    <p class="text-end"><a href="/clearbasic">logout</a></p>
    <h1 class="my-3">Таблиця заявок (CRM)</h1>

    <table class="table table-hover table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th scope="col">#</th>
                <th scope="col">Ім'я</th>
                <th scope="col">Телефон</th>
                <th scope="col">Час звернення</th>
                <th scope="col">Джерело</th>
                <th scope="col">Видалити</th>
            </tr>
        </thead>
        <tbody>
        {{range .}}
        <tr {{if eq .Source "implant_landing"}}class="source-ad"{{end}}>
            <td>{{.ID}}</td>
            <td>{{.Name}}</td>
            <td>{{.Tel}}</td>
            <td>{{formatTime .Time}}</td>
            <td>
                {{if eq .Source "implant_landing"}}
                    <span class="badge badge-ad bg-danger">🎯 Реклама (імплантація)</span>
                {{else}}
                    <span class="badge badge-main bg-primary">🌐 Основний сайт</span>
                {{end}}
            </td>
            <td><a href="/crm/delete/{{.ID}}" class="text-danger" onclick="return confirm('Видалити запис?')">Видалити</a></td>
        </tr>
        {{end}}
        </tbody>
    </table>

</div>



</body>
</html>
